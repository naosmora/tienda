<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <main class="container mt-4">

            <div th:if="${todoOk}" class="alert alert-success">[[${todoOk}]]</div>
            <div th:if="${error}" class="alert alert-danger">[[${error}]]</div>

            <div class="row py-3">
                <div class="col">
                    <button type="button" class="btn btn-primary"
                            data-bs-toggle="modal" data-bs-target="#agregarModal">
                        <i class="fa-solid fa-plus"></i> [[#{constante.agregar}]]
                    </button>
                </div>
            </div>

            <div class="row p-3">
                <div class="col-md-9">
                    <div class="card">
                        <div class="card-header"><h4>[[#{constante.listado}]]</h4></div>
                        <div class="card-body">
                            <div th:if="${constantes != null and !constantes.empty}">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>[[#{constante.atributo}]]</th>
                                            <th>[[#{constante.valor}]]</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${constantes}">
                                            <td>[[${c.idConstante}]]</td>
                                            <td>[[${c.atributo}]]</td>
                                            <td>[[${c.valor}]]</td>
                                            <td>
                                                <a th:href="@{/constante/modificar/}+${c.idConstante}"
                                                   class="btn btn-warning btn-sm">
                                                    <i class="fas fa-pencil-alt"></i>
                                                </a>
                                                <form th:action="@{/constante/eliminar}"
                                                      method="post" style="display:inline">
                                                    <input type="hidden" name="idConstante"
                                                           th:value="${c.idConstante}"/>
                                                    <button type="submit"
                                                            class="btn btn-danger btn-sm"
                                                            onclick="return confirm('¿Eliminar?')">
                                                        <i class="fa-solid fa-trash"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div th:if="${constantes == null or constantes.empty}"
                                 class="text-center p-2">
                                <span>[[#{lista.vacia}]]</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-center bg-warning mb-3">
                        <div class="card-body">
                            <h3>[[#{constante.total}]]</h3>
                            <h4 class="fs-2">[[${totalConstantes}]]</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal Agregar -->
            <div class="modal fade" id="agregarModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-primary text-white">
                            <h5 class="modal-title">[[#{constante.agregar}]]</h5>
                            <button type="button" class="btn-close"
                                    data-bs-dismiss="modal"></button>
                        </div>
                        <form th:action="@{/constante/guardar}" method="post">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label>[[#{constante.atributo}]]</label>
                                    <input type="text" name="atributo"
                                           class="form-control" required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{constante.valor}]]</label>
                                    <input type="text" name="valor"
                                           class="form-control" required="true"/>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">[[#{accion.cerrar}]]</button>
                                <button type="submit"
                                        class="btn btn-primary">[[#{accion.guardar}]]</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
