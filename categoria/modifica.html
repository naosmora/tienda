<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <main class="container mt-4">
            <div class="row">
                <div class="col-md-2"></div>
                <div class="col-md-8">
                    <form method="POST" th:action="@{/categoria/guardar}"
                          th:object="${categoria}" enctype="multipart/form-data">
                        <input type="hidden" name="idCategoria" th:field="*{idCategoria}"/>
                        <input type="hidden" name="rutaImagen" th:field="*{rutaImagen}"/>
                        <div class="row py-4 mb-4 bg-light">
                            <div class="col-md-4 d-grid">
                                <a th:href="@{/categoria/listado}" class="btn btn-primary">
                                    <i class="fas fa-arrow-left"></i> [[#{accion.regresar}]]
                                </a>
                            </div>
                            <div class="col-md-4 d-grid">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-check"></i> [[#{accion.guardar}]]
                                </button>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header"><h4>[[#{accion.actualizar}]]</h4></div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label>[[#{categoria.descripcion}]]</label>
                                    <input type="text" class="form-control"
                                           name="descripcion" th:field="*{descripcion}"
                                           required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{categoria.activo}]]</label>
                                    <input class="form-check-input" type="checkbox"
                                           name="activo" th:field="*{activo}"/>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
