<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <main class="container mt-4">

            <!-- Mensajes -->
            <div th:if="${todoOk}" class="alert alert-success">[[${todoOk}]]</div>
            <div th:if="${error}" class="alert alert-danger">[[${error}]]</div>

            <!-- Botón agregar -->
            <div class="row py-3">
                <div class="col">
                    <button type="button" class="btn btn-primary"
                            data-bs-toggle="modal" data-bs-target="#agregarModal">
                        <i class="fa-solid fa-plus"></i> [[#{categoria.agregar}]]
                    </button>
                </div>
            </div>

            <div class="row p-3">
                <div class="col-md-9">
                    <div class="card p-2">
                        <div class="card-header"><h4>[[#{categoria.listado}]]</h4></div>
                        <div class="card-body">
                            <div th:if="${categorias != null and !categorias.empty}">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>[[#{categoria.descripcion}]]</th>
                                            <th>[[#{categoria.activo}]]</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${categorias}">
                                            <td>[[${c.idCategoria}]]</td>
                                            <td>[[${c.descripcion}]]</td>
                                            <td th:text="${c.activo} ? 'Activa':'Inactiva'"></td>
                                            <td>
                                                <a th:href="@{/categoria/modificar/}+${c.idCategoria}"
                                                   class="btn btn-warning btn-sm">
                                                    <i class="fas fa-pencil-alt"></i> [[#{accion.actualizar}]]
                                                </a>
                                                <form th:action="@{/categoria/eliminar}" method="post"
                                                      style="display:inline">
                                                    <input type="hidden" name="idCategoria"
                                                           th:value="${c.idCategoria}"/>
                                                    <button type="submit" class="btn btn-danger btn-sm"
                                                            onclick="return confirm('[[#{accion.confirmar.texto1}]] '+this.value+'?')">
                                                        <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div th:if="${categorias == null or categorias.empty}"
                                 class="text-center p-2">
                                <span>[[#{lista.vacia}]]</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-center bg-success text-white mb-3">
                        <div class="card-body">
                            <h3>[[#{categoria.total}]]</h3>
                            <h4 class="fs-2">
                                <i class="fas fa-layer-group"></i> [[${totalCategorias}]]
                            </h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal Agregar -->
            <div class="modal fade" id="agregarModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-info text-white">
                            <h5 class="modal-title">[[#{categoria.agregar}]]</h5>
                            <button type="button" class="btn-close"
                                    data-bs-dismiss="modal"></button>
                        </div>
                        <form th:action="@{/categoria/guardar}" th:object="${categoria}"
                              enctype="multipart/form-data" method="post">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label>[[#{categoria.descripcion}]]</label>
                                    <input type="text" name="descripcion"
                                           class="form-control" required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{categoria.activo}]]</label>
                                    <input type="checkbox" name="activo"
                                           class="form-check-input"/>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">[[#{accion.cerrar}]]</button>
                                <button type="submit"
                                        class="btn btn-primary">[[#{accion.guardar}]]</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
