<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Bootstrap - Tabla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>
<body class="p-4">

    <h2 class="text-center mb-4">Desafío STEM 4 - Tabla Bootstrap</h2>

    <table class="table table-dark table-striped table-hover">
        <thead>
            <tr>
                <th>Columna 1</th>
                <th>Columna 2</th>
                <th>Columna 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Dato 1A</td>
                <td>Dato 1B</td>
                <td>Dato 1C</td>
            </tr>
            <tr>
                <td>Dato 2A</td>
                <td>Dato 2B</td>
                <td>Dato 2C</td>
            </tr>
            <tr>
                <td>Dato 3A</td>
                <td>Dato 3B</td>
                <td>Dato 3C</td>
            </tr>
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
</body>
</html>
