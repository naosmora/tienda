<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <!-- Fragmento HEAD -->
    <head th:fragment="head">
        <title>TechShop</title>
        <meta charset="UTF-8"/>
        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    </head>

    <body>
        <!-- Fragmento HEADER -->
        <header th:fragment="header" class="navbar navbar-expand-sm p-0">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark w-100">
                <div class="container">
                    <a class="navbar-brand" th:href="@{/}">
                        [[#{plantilla.titulo}]]
                    </a>
                    <button class="navbar-toggler" type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#navbarCollapse">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarCollapse">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item">
                                <a class="nav-link"
                                   th:href="@{/empleados}">[[#{plantilla.productos}]]</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link"
                                   th:href="@{/ventas}">[[#{plantilla.ventas}]]</a>
                            </li>
                        </ul>
                        <!-- Selector de idioma -->
                        <ul class="navbar-nav">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" href="#"
                                   data-bs-toggle="dropdown">
                                    [[#{plantilla.idioma}]]
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item"
                                           th:href="@{/(lang=es)}">Español</a></li>
                                    <li><a class="dropdown-item"
                                           th:href="@{/(lang=en)}">English</a></li>
                                    <li><a class="dropdown-item"
                                           th:href="@{/(lang=fr)}">Français</a></li>
                                    <li><a class="dropdown-item"
                                           th:href="@{/(lang=pt)}">Português</a></li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <!-- Fragmento FOOTER -->
        <footer th:fragment="footer" class="p-2 mt-5 bg-info text-white">
            <p class="lead text-center">[[#{plantilla.derechos}]] &COPY;</p>
        </footer>

    </body>
</html>
