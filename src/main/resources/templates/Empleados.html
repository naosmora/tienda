<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h2 class="text-center mb-4">Gestión de Empleados</h2>

    <!-- Formulario Crear -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Agregar Empleado</div>
        <div class="card-body">
            <form th:action="@{/empleados/guardar}" th:object="${empleado}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required/>
                </div>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>
        </div>
    </div>

    <!-- Tabla Listar -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${empleados}">
                <td th:text="${emp.idEmpleado}"></td>
                <td th:text="${emp.nombre}"></td>
                <td>
                    <a th:href="@{/empleados/editar/{id}(id=${emp.idEmpleado})}" 
                       class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/empleados/eliminar/{id}(id=${emp.idEmpleado})}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Eliminar este empleado?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
