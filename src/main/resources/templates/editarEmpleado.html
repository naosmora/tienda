<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h2 class="text-center mb-4">Editar Empleado</h2>
    <div class="card">
        <div class="card-header bg-warning">Modificar datos</div>
        <div class="card-body">
            <form th:action="@{/empleados/actualizar/{id}(id=${empleado.idEmpleado})}" 
                  th:object="${empleado}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required/>
                </div>
                <button type="submit" class="btn btn-warning">Actualizar</button>
                <a href="/empleados" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
