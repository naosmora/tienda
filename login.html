<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <main class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header bg-dark text-white text-center">
                            <h4>[[#{login.login}]]</h4>
                        </div>
                        <div class="card-body">
                            <div th:if="${param.error}"
                                 class="alert alert-danger">[[#{error.login}]]</div>
                            <div th:if="${param.logout}"
                                 class="alert alert-success">Sesión cerrada.</div>
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label>[[#{login.username}]]</label>
                                    <input type="text" name="username"
                                           class="form-control" required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{login.password}]]</label>
                                    <input type="password" name="password"
                                           class="form-control" required="true"/>
                                </div>
                                <button type="submit"
                                        class="btn btn-dark w-100">[[#{login.login}]]</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
