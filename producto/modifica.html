<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <main class="container mt-4">
            <div class="row">
                <div class="col-md-2"></div>
                <div class="col-md-8">
                    <form method="POST" th:action="@{/producto/guardar}"
                          th:object="${producto}" enctype="multipart/form-data">
                        <input type="hidden" name="idProducto" th:field="*{idProducto}"/>
                        <input type="hidden" name="rutaImagen" th:field="*{rutaImagen}"/>
                        <div class="row py-4 mb-4 bg-light">
                            <div class="col-md-4 d-grid">
                                <a th:href="@{/producto/listado}" class="btn btn-primary">
                                    <i class="fas fa-arrow-left"></i> [[#{accion.regresar}]]
                                </a>
                            </div>
                            <div class="col-md-4 d-grid">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-check"></i> [[#{accion.guardar}]]
                                </button>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header"><h4>[[#{accion.actualizar}]]</h4></div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label>[[#{producto.descripcion}]]</label>
                                    <input type="text" class="form-control"
                                           name="descripcion" th:field="*{descripcion}"
                                           required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{producto.categoria}]]</label>
                                    <select name="categoria.idCategoria"
                                            th:field="*{categoria.idCategoria}"
                                            class="form-select">
                                        <option th:each="c : ${categorias}"
                                                th:value="${c.idCategoria}"
                                                th:text="${c.descripcion}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{producto.precio}]]</label>
                                    <input type="number" step="0.01" class="form-control"
                                           name="precio" th:field="*{precio}"
                                           required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{producto.existencias}]]</label>
                                    <input type="number" class="form-control"
                                           name="existencias" th:field="*{existencias}"
                                           required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{producto.activo}]]</label>
                                    <input class="form-check-input" type="checkbox"
                                           name="activo" th:field="*{activo}"/>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
